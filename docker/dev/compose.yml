services:
  postgres:
    image: postgres:17
    container_name: attendance-postgres
    restart: unless-stopped

    ports:
      - '5432:5432'

    env_file:
      - ../../.env.development

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: unless-stopped

    ports:
      - '6379:6379'

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    container_name: attendance-mailpit
    restart: unless-stopped

    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTP

    environment:
      MP_DATA_FILE: /data/mailpit.db

    volumes:
      - mailpit_data:/data

    networks:
      - app-network

  app:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
      target: dev

    container_name: attendance-app
    restart: unless-stopped

    env_file:
      - ../../.env.development

    # Inside the compose network, services reach each other by name — localhost
    # (what .env.development uses for running the app on the host) won't work here.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      # Safety net: if node_modules ever legitimately drifts from pnpm-lock.yaml
      # (e.g. a dependency was added on the host without rebuilding the image),
      # let pnpm's startup check auto-reinstall instead of aborting for lack of
      # a TTY — self-heals on next restart rather than crash-looping.
      CI: 'true'

    ports:
      - '3000:3000'

    volumes:
      - ../..:/app
      - /app/node_modules
      - /app/.next

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

    networks:
      - app-network

  worker:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
      target: dev

    container_name: attendance-worker
    restart: unless-stopped
    command: pnpm worker

    env_file:
      - ../../.env.development

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      CI: 'true'

    volumes:
      - ../..:/app
      - /app/node_modules
      - /app/.next

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  mailpit_data:

networks:
  app-network:
    driver: bridge
