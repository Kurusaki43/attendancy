services:
  postgres:
    image: postgres:17
    container_name: attendance-postgres
    restart: unless-stopped

    ports:
      - '5432:5432'

    env_file:
      - ../../.env.development

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: unless-stopped

    ports:
      - '6379:6379'

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    container_name: attendance-mailpit
    restart: unless-stopped

    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTP

    environment:
      MP_DATA_FILE: /data/mailpit.db

    volumes:
      - mailpit_data:/data

    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  mailpit_data:

networks:
  app-network:
    driver: bridge
